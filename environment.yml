# Conda environment file for the Automation repository
# Note: torch may require installing from the official PyTorch wheels or conda channel.
# If the workflow cannot fetch torch via pip, consider using the `pytorch` channel or
# switching to `pip install -r requirements.txt` in the CI workflow.
name: automated-evaluator
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
    - numpy==2.4.3
    - pandas==3.0.1
    - torch==2.11.0
    - pytest==9.0.2
    - filelock==3.25.2
    - fsspec==2026.2.0
    - iniconfig==2.3.0
    - Jinja2==3.1.6
    - MarkupSafe==3.0.3
    - mpmath==1.3.0
    - networkx==3.6.1
    - packaging==26.0
    - pluggy==1.6.0
    - Pygments==2.19.2
    - python-dateutil==2.9.0.post0
    - setuptools==70.2.0
    - six==1.17.0
    - sympy==1.14.0
    - typing_extensions==4.15.0
